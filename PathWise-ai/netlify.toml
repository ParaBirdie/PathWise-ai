[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy     = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
    X-Content-Type-Options      = "nosniff"
    X-Frame-Options             = "DENY"
    Referrer-Policy             = "strict-origin-when-cross-origin"
    Permissions-Policy          = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security   = "max-age=63072000; includeSubDomains; preload"
